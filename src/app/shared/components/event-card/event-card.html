<div (click)="goToDetail()" class="group bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 cursor-pointer flex flex-col h-full w-full">

  <div class="h-44 bg-gray-50 relative overflow-hidden flex-shrink-0">
    @if (event().image) {
      <img [src]="event().image" [alt]="event().title" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 shadow-inner">
    } @else {
      <div class="absolute inset-0 bg-gradient-to-tr from-indigo-50/50 via-gray-100/30 to-purple-50/50 group-hover:scale-105 transition-transform duration-700"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <i class="pi pi-camera text-gray-200 text-5xl"></i>
      </div>
    }

    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-all duration-300"></div>
  </div>

  <div class="p-6 flex flex-col flex-grow relative">
    <div class="flex items-start justify-between mb-3">
      <span class="inline-flex px-3 py-1 bg-indigo-50 text-indigo-600 text-[11px] font-bold rounded-lg tracking-wider">
        {{ event().category.toUpperCase() }}
      </span>
    </div>

    <h3 class="font-bold text-lg text-gray-900 leading-tight mb-4 group-hover:text-primary transition-colors line-clamp-2 min-h-[2.5rem]">
      {{ event().title }}
    </h3>

    <div class="space-y-2 mt-auto">
      <div class="flex items-center text-[13px] text-gray-500 gap-2">
        <i class="pi pi-calendar-plus text-red-400 text-xs"></i>
        <span>{{ event().date }} · 6:00 PM</span>
      </div>

      <div class="flex items-start text-[13px] text-gray-500 gap-2">
        <i class="pi pi-map-marker text-red-400 text-xs mt-0.5"></i>
        <span class="line-clamp-1">{{ event().location }}</span>
      </div>
    </div>

    <div class="absolute bottom-6 right-6">
      <div class="inline-flex items-center gap-1.5 bg-indigo-50 px-3 py-1 rounded-full text-indigo-600">
        <i class="pi pi-users text-[10px]"></i>
        <span class="text-[11px] font-bold">89 going</span>
      </div>
    </div>
  </div>

</div>
