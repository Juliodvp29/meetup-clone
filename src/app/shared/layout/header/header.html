<header class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
    <div class="flex items-center gap-4">
      <h1 class="text-lg sm:text-xl font-bold text-[#353cf4] cursor-pointer hover:text-blue-800 transition-colors" routerLink="/">
        <i class="pi pi-calendar mr-2"></i><span class="hidden sm:inline">Meetup Clone</span>
      </h1>
    </div>

    <nav class="hidden md:flex gap-8 items-center">
      <a routerLink="/" class="text-sm text-gray-700 hover:text-[#353cf4] transition-colors font-medium">Explore</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/dashboard" class="text-sm text-gray-700 hover:text-[#353cf4] transition-colors font-medium">Dashboard</a>
      }
    </nav>

    <div class="hidden md:flex items-center gap-3">
      @if (auth.isLoggedIn()) {
        <button
          pButton
          label="Logout"
          (click)="logout()"
          class="!bg-red-50 !border-none !text-red-600 !px-5 !py-2 !rounded-lg !font-semibold hover:!bg-red-100 transition-colors !h-auto text-sm"
        ></button>
      } @else {
        <a routerLink="/login" pButton label="Sign in" class="!bg-[#353cf4] !border-none !text-white !px-6 !py-2 !rounded-lg !font-semibold hover:!bg-blue-800 transition-colors !h-auto text-sm"></a>
      }
    </div>

    <div class="md:hidden flex items-center gap-2">
      @if (auth.isLoggedIn()) {
        <a
          routerLink="/dashboard"
          pButton
          [rounded]="true"
          [text]="true"
          aria-label="Go to dashboard"
          class="!text-[#353cf4] w-9 h-9 inline-flex items-center justify-center"
        >
          <i class="pi pi-home text-base"></i>
        </a>
        <button 
          pButton 
          icon="pi pi-sign-out" 
          [rounded]="true" 
          [text]="true"
          (click)="logout()"
          class="!text-red-600 w-9 h-9"
        ></button>
      } @else {
        <a routerLink="/login" pButton icon="pi pi-sign-in" [rounded]="true" [text]="true" class="!text-[#353cf4] w-9 h-9"></a>
      }
    </div>
  </div>
</header>
