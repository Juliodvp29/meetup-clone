<section class="bg-primary text-white py-12 md:py-16">
  <div class="max-w-5xl mx-auto px-4 text-center">
    <h1 class="text-3xl md:text-5xl font-bold mb-4 leading-tight">
      Find your next event or group
    </h1>

    <p class="text-base md:text-lg mb-8 opacity-90 max-w-2xl mx-auto">
      Connect with people who share your passions. Discover events happening
      near you.
    </p>

    <div class="flex gap-2 max-w-xl mx-auto">
      <input
        pInputText
        type="text"
        placeholder="Search events..."
        class="w-full"
      />

      <button pButton label="Search"></button>
    </div>
  </div>
</section>

<section class="max-w-6xl mx-auto px-4 py-12">
  <h2 class="text-xl font-bold mb-6">Browse by category</h2>

  <div class="flex flex-wrap gap-4">
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-microphone text-blue-500"></i> Music
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-desktop text-black"></i> Tech
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-palette text-amber-600"></i> Arts
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-map text-amber-500"></i> Sports
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-compass text-orange-600"></i> Food
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-image text-green-600"></i> Outdoors
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-book text-red-500"></i> Learning
    </button>
    <button class="px-5 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-medium shadow-sm hover:shadow-md transition-all flex items-center gap-2">
      <i class="pi pi-users text-blue-400"></i> Culture
    </button>
  </div>
</section>

<section class="max-w-6xl mx-auto px-4 pb-20">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-xl font-bold">Upcoming events near you</h2>
    <a href="#" class="text-primary font-medium flex items-center gap-1 hover:underline">
      See all <i class="pi pi-arrow-right text-xs"></i>
    </a>
  </div>

  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (event of events(); track event.id) {
      <app-event-card [event]="event" />
    }
  </div>
</section>
