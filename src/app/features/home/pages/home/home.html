<section class="bg-primary text-white py-10 md:py-14">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 text-left flex flex-col items-start w-full">
    <h1 class="text-3xl md:text-5xl font-bold mb-3 tracking-tight leading-tight max-w-2xl">
      Find your next event or group
    </h1>

    <p class="text-base md:text-lg mb-8 text-white/90 max-w-xl font-medium leading-relaxed">
      Connect with people who share your passions. Discover events happening near you.
    </p>

    <div class="flex items-center w-full max-w-3xl bg-white rounded-xl p-1.5 shadow-lg">
      <div class="flex items-center flex-grow pl-4">
        <i class="pi pi-search text-gray-400 text-lg"></i>
        <input
          pInputText
          type="text"
          placeholder="Search events, groups, cities..."
          class="flex-grow px-4 py-3 bg-transparent !border-0 !shadow-none !ring-0 text-gray-900 text-base placeholder:text-gray-400 focus:outline-none"
        />
      </div>
      <button pButton label="Search" class="!px-10 !py-3.5 !rounded-lg !font-bold !bg-[#353cf4] !border-none !text-white hover:!bg-blue-800 transition-colors shadow-none"></button>
    </div>
  </div>
</section>

<section class="max-w-7xl mx-auto px-6 lg:px-8 py-16 lg:py-20">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <h2 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">Browse by category</h2>
  </div>

  <div class="flex flex-wrap gap-3">
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-microphone text-purple-500 text-base"></i> Music
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-desktop text-blue-500 text-base"></i> Tech
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-palette text-pink-500 text-base"></i> Arts
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-map text-emerald-500 text-base"></i> Sports
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-compass text-orange-500 text-base"></i> Food
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-image text-teal-500 text-base"></i> Outdoors
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-book text-red-500 text-base"></i> Learning
    </button>
    <button pButton class="!px-6 !py-3.5 !bg-white !border !border-gray-200 !rounded-xl text-sm font-semibold !text-gray-700 shadow-sm hover:shadow hover:!border-gray-300 hover:-translate-y-0.5 transition-all flex items-center gap-2.5">
      <i class="pi pi-users text-indigo-500 text-base"></i> Culture
    </button>
  </div>
</section>

<section class="max-w-7xl mx-auto px-6 lg:px-8 pb-24">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
    <h2 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">Upcoming events near you</h2>
    <a href="#" class="text-primary font-semibold flex items-center gap-2 hover:text-primary/80 transition-colors group">
      See all events <i class="pi pi-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
    </a>
  </div>

  <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
    @for (event of events(); track event.id) {
      <app-event-card [event]="event" class="flex" />
    }
  </div>
</section>
