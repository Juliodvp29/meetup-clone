<div class="flex flex-col md:flex-row w-full min-h-screen relative bg-slate-50 lg:bg-white overflow-x-hidden">
  
  <div class="w-full md:w-[260px] lg:w-[280px] xl:w-[310px] shrink-0 border-b md:border-b-0 md:border-r border-gray-100 bg-white md:min-h-[calc(100vh-65px)] md:sticky md:top-16 z-20">
     <app-dashboard-profile [activeTab]="activeTab" />
  </div>

  <div class="flex-grow w-full bg-slate-50 relative pb-20 px-4 sm:px-6 md:p-8 lg:p-10 xl:p-12">
     
     <app-dashboard-stats />
     
     
     @if (activeTab() !== 'groups' && activeTab() !== 'saved') {
       <div class="mt-6 md:mt-8">
         <h2 class="text-lg md:text-xl font-bold text-gray-900 mb-4 tracking-tight">My upcoming events</h2>
         <div class="flex flex-col gap-3 sm:gap-4">
           @for (event of events(); track event.id) {
             <app-dashboard-event-item [event]="event" />
           }
         </div>
       </div>
     }
     
     @if (activeTab() !== 'events' && activeTab() !== 'saved') {
       <div class="mt-8 xl:mt-10">
         <h2 class="text-lg md:text-xl font-bold text-gray-900 mb-4 tracking-tight">My groups</h2>
         <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-4">
           @for (group of groups(); track group.id) {
             <app-dashboard-group-item [group]="group" />
           }
         </div>
       </div>
     }
     
  </div>
</div>
