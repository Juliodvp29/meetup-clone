<div class="flex flex-col md:flex-row w-full min-h-screen relative mt-px bg-slate-50 lg:bg-white overflow-x-hidden">
  
  <div class="w-full md:w-[260px] lg:w-[280px] xl:w-[310px] shrink-0 border-r border-gray-100 bg-white md:min-h-[calc(100vh-65px)] z-20 md:sticky md:top-0">
     <app-dashboard-profile />
  </div>

  <div class="flex-grow w-full bg-slate-50 relative pb-20 md:p-8 xl:p-12">
     
     <app-dashboard-stats />
     
     <div>
       <h2 class="text-[19px] font-bold text-gray-900 mb-4 tracking-tight">My upcoming events</h2>
       <div class="flex flex-col gap-3 sm:gap-4">
         @for (event of events(); track event.id) {
           <app-dashboard-event-item [event]="event" />
         }
       </div>
     </div>
     
     <div class="mt-8 xl:mt-10">
       <h2 class="text-[19px] font-bold text-gray-900 mb-4 tracking-tight">My groups</h2>
       <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-3 sm:gap-4">
         @for (group of groups(); track group.id) {
           <app-dashboard-group-item [group]="group" />
         }
       </div>
     </div>
     
  </div>
</div>
