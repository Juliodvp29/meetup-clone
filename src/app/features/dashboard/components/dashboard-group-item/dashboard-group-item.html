<div class="bg-white rounded-[20px] p-5 border border-gray-100 shadow-[0_2px_8px_-4px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow relative overflow-hidden flex flex-col justify-between h-full">
  
  <div class="flex items-start gap-4">
    <div class="shrink-0 mt-0.5">
      <p-avatar 
        [label]="group().avatarLabel" 
        shape="circle" 
        class="[&_.p-avatar]:!w-14 [&_.p-avatar]:!h-14 [&_.p-avatar]:!bg-indigo-50 [&_.p-avatar]:!text-[#353cf4] [&_.p-avatar]:!text-lg [&_.p-avatar]:!font-bold"
      ></p-avatar>
    </div>
    
    <div class="flex-grow min-w-0">
      <h3 class="text-[17px] font-bold text-gray-900 leading-tight mb-1 truncate flex items-center gap-1.5">
        {{ group().title }} <i [class]="group().icon + ' text-[#353cf4] text-[15px]'"></i>
      </h3>
      <p class="text-gray-500 text-[13px] font-medium truncate mb-2">
        {{ group().members }} members
      </p>
      @if (group().nextEvent) {
        <p class="text-gray-400 text-[12px] font-medium truncate mt-1">
          Next event: {{ group().nextEvent }}
        </p>
      }
    </div>
  </div>

  <div class="mt-5 flex justify-end">
     <button 
       pButton 
       [label]="group().actionLabel" 
       [class]="group().actionStyle === 'danger' ? '!bg-red-50 hover:!bg-red-100 !text-red-500 !border-none !rounded-full !px-5 !py-2 !text-[13px] !font-bold transition-colors' : '!bg-indigo-50 hover:!bg-indigo-100 !text-[#353cf4] !border-none !rounded-full !px-5 !py-2 !text-[13px] !font-bold transition-colors'"
     ></button>
  </div>
</div>
