<div class="w-full flex-col flex bg-white">
  <div class="md:hidden bg-[#353cf4] text-white flex flex-col items-center pt-8 pb-6 relative w-full">
    <div class="w-20 h-20 rounded-full border-[2.5px] border-white flex items-center justify-center bg-[#353cf4] text-[28px] font-bold mb-3">
      GJ
    </div>
    <h2 class="text-[22px] font-bold mb-0.5 tracking-tight">Julio Otero</h2>
    <p class="text-white/80 text-[13px] font-medium">Bogotá, Colombia · Member since 2023</p>
  </div>

  <div class="hidden md:flex flex-col items-center pt-10 pb-8 px-6 text-center border-b border-gray-100">
    <p-avatar label="JO" shape="circle" size="xlarge" class="!bg-[#353cf4] !text-white !font-bold !text-[28px] !w-[88px] !h-[88px] mb-4"></p-avatar>
    <h2 class="text-[20px] font-bold text-gray-900 leading-tight mb-0.5">Julio Otero</h2>
    <p class="text-gray-500 text-[13px] font-medium">Bogotá, Colombia</p>
    <p class="text-gray-400 text-[12px] mt-0.5">Member since 2023</p>
  </div>

  <div class="md:hidden flex bg-white border-b border-gray-100 py-3.5 text-center divide-x divide-gray-100/60 shadow-sm relative z-10 w-full">
     <div class="flex-1 flex flex-col justify-center">
       <span class="text-[22px] font-bold text-[#353cf4] leading-tight">12</span>
       <span class="text-[12px] text-gray-500 font-medium">Events</span>
     </div>
     <div class="flex-1 flex flex-col justify-center">
       <span class="text-[22px] font-bold text-[#353cf4] leading-tight">8</span>
       <span class="text-[12px] text-gray-500 font-medium">Groups</span>
     </div>
     <div class="flex-1 flex flex-col justify-center">
       <span class="text-[22px] font-bold text-[#353cf4] leading-tight">142</span>
       <span class="text-[12px] text-gray-500 font-medium">Following</span>
     </div>
  </div>

  <div class="md:hidden flex px-6 pt-1 space-x-8 overflow-x-auto text-[14.5px] font-bold w-full bg-white relative z-10 border-b border-gray-200">
      <button 
        pButton 
        (click)="changeTab('events')"
        [class.!border-[#353cf4]]="activeTab() === 'events'"
        [class.!text-[#353cf4]]="activeTab() === 'events'"
        [class.!border-transparent]="activeTab() !== 'events'"
        [class.!text-gray-400]="activeTab() !== 'events'"
        class="!px-0 !pb-3.5 !pt-3 !bg-transparent !border-0 !border-b-[2.5px] !rounded-none whitespace-nowrap shadow-none focus-visible:!outline-none transition-colors"
      >
        My Events
      </button>
      <button 
        pButton 
        (click)="changeTab('groups')"
        [class.!border-[#353cf4]]="activeTab() === 'groups'"
        [class.!text-[#353cf4]]="activeTab() === 'groups'"
        [class.!border-transparent]="activeTab() !== 'groups'"
        [class.!text-gray-400]="activeTab() !== 'groups'"
        class="!px-0 !pb-3.5 !pt-3 !bg-transparent !border-0 !border-b-[2.5px] !rounded-none whitespace-nowrap hover:!text-gray-600 shadow-none focus-visible:!outline-none transition-colors"
      >
        Groups
      </button>
      <button 
        pButton 
        (click)="changeTab('saved')"
        [class.!border-[#353cf4]]="activeTab() === 'saved'"
        [class.!text-[#353cf4]]="activeTab() === 'saved'"
        [class.!border-transparent]="activeTab() !== 'saved'"
        [class.!text-gray-400]="activeTab() !== 'saved'"
        class="!px-0 !pb-3.5 !pt-3 !bg-transparent !border-0 !border-b-[2.5px] !rounded-none whitespace-nowrap hover:!text-gray-600 shadow-none focus-visible:!outline-none transition-colors"
      >
        Saved
      </button>
  </div>

  <nav class="hidden md:flex flex-col px-4 py-6 gap-1 w-full">
    <button pButton class="!bg-transparent !border-none !text-gray-600 hover:!bg-gray-50 !rounded-xl transition-colors font-semibold w-full !justify-start !px-4 !py-3 gap-3 shadow-none text-[14px]">
      <i class="pi pi-home"></i> Home
    </button>
    <button pButton class="!bg-indigo-50/70 !border-none !text-[#353cf4] !rounded-xl transition-colors font-semibold w-full !justify-start !px-4 !py-3 gap-3 shadow-none text-[14px] relative group overflow-hidden">
      <i class="pi pi-calendar-plus text-[#353cf4]"></i> My Events
      <span class="ml-auto bg-[#353cf4] text-white text-[11px] font-bold px-2 py-0.5 rounded-full flex items-center justify-center min-w-[24px]">12</span>
    </button>
    <button pButton class="!bg-transparent !border-none !text-gray-600 hover:!bg-gray-50 !rounded-xl transition-colors font-semibold w-full !justify-start !px-4 !py-3 gap-3 shadow-none text-[14px]">
      <i class="pi pi-users"></i> My Groups
      <span class="ml-auto bg-gray-100 text-gray-500 text-[11px] font-bold px-2 py-0.5 rounded-full flex items-center justify-center min-w-[24px]">8</span>
    </button>
    <button pButton class="!bg-transparent !border-none !text-gray-600 hover:!bg-gray-50 !rounded-xl transition-colors font-semibold w-full !justify-start !px-4 !py-3 gap-3 shadow-none text-[14px]">
      <i class="pi pi-heart"></i> Saved
      <span class="ml-auto bg-gray-100 text-gray-500 text-[11px] font-bold px-2 py-0.5 rounded-full flex items-center justify-center min-w-[24px]">24</span>
    </button>
    
    <div class="my-4 border-t border-gray-100 mx-2"></div>
    
    <button pButton class="!bg-transparent !border-none !text-gray-600 hover:!bg-gray-50 !rounded-xl transition-colors font-semibold w-full !justify-start !px-4 !py-3 gap-3 shadow-none text-[14px]">
      <i class="pi pi-cog"></i> Settings
    </button>
  </nav>

</div>
